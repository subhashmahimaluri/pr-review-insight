version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    ignore:
      # hard-won rule 1: ESM-only majors break the ncc bundle at load time.
      # Majors here only via a deliberate PR that also passes the dist smoke test.
      - dependency-name: '@actions/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
