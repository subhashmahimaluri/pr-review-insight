# Mutation testing (Stryker) — the honesty metric for the test suite.
# Nightly + manual: mutation runs take minutes, so they stay out of PR CI.
# The score answers "would the tests notice a seeded bug?", which coverage
# alone cannot. See docs/test-strength-plan.md.
name: Mutation testing
on:
  schedule:
    - cron: '17 3 * * *' # nightly, off-peak
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Restore incremental mutation state
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.sha }}
          restore-keys: stryker-incremental-
      - run: npm run test:mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
